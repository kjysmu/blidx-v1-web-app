services:
  - type: web
    name: blidx-v1-web-app
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: blidx-demo-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_NAME
        value: Blidx Backend
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: USE_DATABASE_STORAGE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: AUTH_MAX_FAILED_ATTEMPTS
        value: "8"
      - key: AUTH_LOCKOUT_MINUTES
        value: "15"
      - key: LOGIN_RATE_LIMIT_ATTEMPTS
        value: "20"
      - key: LOGIN_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_MAX_TOKENS
        value: "1200"
      - key: ANTHROPIC_TEMPERATURE
        value: "0.7"
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        value: https://blidx-v1-web-app.onrender.com/auth/linkedin/callback
      - key: LINKEDIN_SCOPES
        value: openid profile w_member_social
      - key: LINKEDIN_API_VERSION
        value: "202605"
      - key: LINKEDIN_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: LINKEDIN_OAUTH_STATE_EXPIRE_MINUTES
        value: "10"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
